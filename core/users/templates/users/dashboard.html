<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #28a745; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ message }}</h1>
        <p>You are logged in as {{ user.username }}.</p>
        <p>Welcome to your admin dashboard!</p>
    </div>
</body>
</html>
